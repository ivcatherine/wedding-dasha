```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Свадебные шашлыки</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Russo+One&family=Marck+Script&family=Play:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a0a00;
      font-family: 'Play', sans-serif;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    .page__image {
      display: block;
      width: 100%;
    }

    /* Первый слайд */

    .cassette-player {
      position: absolute;
      top: 7%;
      left: 12%;
      z-index: 20;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 60px;
      height: 60px;

      border: none;
      border-radius: 50%;
      background: rgba(204, 204, 204, 0.85);
      box-shadow: 0 0 12px rgba(0, 0, 0, 45%);

      color: #111;
      font-size: 24px;
      line-height: 1;

      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    /* Второй слайд */

    .title-wedding {
      position: absolute;
      top: 4%;
      right: 10%;

      width: 45%;

      color: #fff;
      font-family: 'Russo One', sans-serif;
      font-size: clamp(17px, 5vw, 36px);
      line-height: 115%;
      letter-spacing: 1px;
      text-align: right;
      text-transform: uppercase;
      text-shadow:
        3px 3px 0 #8b0000,
        0 0 25px rgba(220, 0, 0, 70%);

      animation: pulseTitle 2500ms ease-in-out infinite alternate;
    }

    @keyframes pulseTitle {
      from {
        text-shadow:
          3px 3px 0 #8b0000,
          0 0 15px rgba(200, 0, 0, 40%);
      }

      to {
        text-shadow:
          3px 3px 0 #c00,
          0 0 35px rgba(255, 60, 0, 90%);
      }
    }

    .age-badge {
      position: absolute;
      top: 5%;
      left: 4%;

      width: 18%;

      font-family: 'Oswald', sans-serif;
      text-align: center;

      transform: rotate(-2deg);
    }

    .age-badge__text {
      display: block;

      color: #ffd700;
      font-size: clamp(6px, 2vw, 12px);
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #000;
      text-transform: uppercase;
    }

    .age-badge__number {
      display: block;

      color: #ff2200;
      font-size: clamp(20px, 6vw, 46px);
      font-weight: 900;
      line-height: 100%;
      text-shadow:
        3px 3px 0 #000,
        0 0 15px rgba(255, 50, 0, 70%);
    }

    .info {
      position: absolute;
      top: 28%;
      right: 3%;

      display: flex;
      flex-direction: column;
      gap: clamp(4px, 1vw, 8px);

      width: 53%;
    }

    .info-card {
      padding:
        clamp(3px, 1vw, 7px)
        clamp(7px, 2vw, 13px);

      border: 2px solid #a00;
      border-radius: 5px;
      background: rgba(255, 255, 255, 91%);
      box-shadow: 2px 2px 0 #700;

      opacity: 0;
      transform: translateY(16px);
      transition:
        opacity 500ms ease,
        transform 500ms ease;
    }

    .info-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-card__label {
      margin-bottom: 2px;
      padding-bottom: 1px;

      border-bottom: 1px solid #c00;

      color: #8b0000;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(8px, 2vw, 14px);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .info-card__value {
      color: #1a0a00;
      font-size: clamp(8px, 2vw, 13px);
      font-weight: 700;
      line-height: 135%;
    }

    .info-card__time {
      display: inline-block;
      margin-left: 3px;

      color: #c00;
      font-size: clamp(10px, 2vw, 16px);
    }

    .info-card__dresscode {
      font-size: clamp(7px, 1vw, 11px);
      font-weight: 400;
      line-height: 145%;
    }

    .info-card__ps {
      color: #8b0000;
      font-family: 'Marck Script', cursive;
      font-size: clamp(11px, 3vw, 19px);
      text-align: center;
    }
  </style>
</head>

<body>
  <main>
    <!-- Первый слайд -->
    <section class="page page--first">
      <img class="page__image" src="first.jpeg" alt="Молодожёны">

      <button
        class="cassette-player"
        type="button"
        onclick="toggleMusic()"
        aria-label="Включить музыку"
      >
        ▶
      </button>
    </section>

    <!-- Второй слайд -->
    <section class="page page--second">
      <img class="page__image" src="second.jpeg" alt="Фон приглашения">

      <h1 class="title-wedding">
        Свадебные<br>
        шашлыки
      </h1>

      <div class="age-badge">
        <span class="age-badge__text">Вход</span>
        <span class="age-badge__number">18+</span>
      </div>

      <div class="info">
        <div class="info-card" data-delay="0">
          <div class="info-card__label">Когда?</div>
          <div class="info-card__value">
            18.07.2026
            <span class="info-card__time">15:00</span>
          </div>
        </div>

        <div class="info-card" data-delay="150">
          <div class="info-card__label">Где?</div>
          <div class="info-card__value">
            СНТ Переработчик, 3 улица, 134 дом
          </div>
        </div>

        <div class="info-card" data-delay="300">
          <div class="info-card__label">Дресс-код</div>
          <div class="info-card__value info-card__dresscode">
            Второй день свадьбы будет проходить в стиле 90-х.
            Проявляйте креатив, фантазию и надевайте самые яркие
            и дерзкие образы!
          </div>
        </div>

        <div class="info-card" data-delay="450">
          <div class="info-card__value info-card__ps">
            p.s. еда — наша, пиво — ваше!
          </div>
        </div>
      </div>
    </section>
  </main>

  <audio id="wedding-audio" src="music.mp3" preload="none"></audio>

  <script>
    function toggleMusic() {
      const audio = document.getElementById('wedding-audio');
      const button = document.querySelector('.cassette-player');

      if (!audio || !button) {
        return;
      }

      if (audio.paused) {
        audio.play();
        button.textContent = '❚❚';
        return;
      }

      audio.pause();
      button.textContent = '▶';
    }

    const cards = document.querySelectorAll('.info-card');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) {
          return;
        }

        const delay = Number(entry.target.dataset.delay) || 0;

        setTimeout(() => {
          entry.target.classList.add('visible');
        }, delay);

        observer.unobserve(entry.target);
      });
    }, {
      threshold: 0.2,
    });

    cards.forEach((card) => {
      observer.observe(card);
    });
  </script>
</body>
</html>
